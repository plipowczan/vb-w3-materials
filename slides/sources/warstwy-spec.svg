<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="3" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Layer 1: PRD -->
  <rect x="300" y="70" width="480" height="100" rx="14" fill="#0a1f17" stroke="#00ff9d" stroke-width="2.5"/>
  <text x="324" y="108" fill="#00ff9d" font-size="22" font-weight="700">PRD</text>
  <text x="324" y="134" fill="#f3f4f6" font-size="16" font-weight="600">CO i DLACZEGO</text>
  <text x="324" y="156" fill="#9aa4b2" font-size="13">problem · persona · wartość</text>

  <!-- Layer 2: SPEC -->
  <rect x="300" y="200" width="480" height="100" rx="14" fill="#0e1626" stroke="#00b8ff" stroke-width="2.5"/>
  <text x="324" y="238" fill="#00b8ff" font-size="22" font-weight="700">SPECYFIKACJA</text>
  <text x="324" y="264" fill="#f3f4f6" font-size="16" font-weight="600">JAK</text>
  <text x="324" y="286" fill="#9aa4b2" font-size="13">architektura · zadania · kryteria akceptacji</text>

  <!-- Layer 3: KOD -->
  <rect x="300" y="330" width="480" height="100" rx="14" fill="#151b2b" stroke="#2b3242" stroke-width="2"/>
  <text x="324" y="368" fill="#9aa4b2" font-size="22" font-weight="700">KOD</text>
  <text x="324" y="394" fill="#cdd3dc" font-size="16">implementacja</text>

  <!-- down arrows "generuje" -->
  <line x1="540" y1="172" x2="540" y2="198" stroke="#6b7280" stroke-width="2.5" marker-end="url(#dn)"/>
  <text x="552" y="190" fill="#6b7280" font-size="13">generuje</text>
  <line x1="540" y1="302" x2="540" y2="328" stroke="#6b7280" stroke-width="2.5" marker-end="url(#dn)"/>
  <text x="552" y="320" fill="#6b7280" font-size="13">generuje</text>

  <!-- Left bracket: TY (layers 1-2) -->
  <path d="M 280 70 L 270 70 L 270 300 L 280 300" fill="none" stroke="#00ff9d" stroke-width="2.5"/>
  <text x="70" y="150" fill="#00ff9d" font-size="20" font-weight="700">TY</text>
  <text x="70" y="178" fill="#f3f4f6" font-size="14">pracujesz nad</text>
  <text x="70" y="198" fill="#f3f4f6" font-size="14">specyfikacją,</text>
  <text x="70" y="218" fill="#f3f4f6" font-size="14">nie nad kodem</text>

  <!-- Left bracket: AGENT (layer 3) -->
  <path d="M 280 330 L 270 330 L 270 430 L 280 430" fill="none" stroke="#6b7280" stroke-width="2.5"/>
  <text x="70" y="375" fill="#9aa4b2" font-size="20" font-weight="700">AGENT</text>
  <text x="70" y="400" fill="#cdd3dc" font-size="14">implementuje kod</text>

  <!-- Right annotations -->
  <line x1="780" y1="120" x2="804" y2="120" stroke="#00ff9d" stroke-width="2"/>
  <text x="812" y="114" fill="#00ff9d" font-size="15" font-weight="600">na 7-dniowe MVP</text>
  <text x="812" y="135" fill="#f3f4f6" font-size="15">PRD wystarcza</text>

  <line x1="780" y1="250" x2="804" y2="250" stroke="#00b8ff" stroke-width="2"/>
  <text x="812" y="237" fill="#00b8ff" font-size="15" font-weight="600">OpenSpec / SDD</text>
  <text x="812" y="258" fill="#f3f4f6" font-size="15">gdy projekt rośnie</text>
  <text x="812" y="279" fill="#6b7280" font-size="13">(kiedyś: osobny dokument SRS)</text>

  <!-- bottom note: works for non-tech -->
  <text x="70" y="478" fill="#00ff9d" font-size="15" font-weight="600">Działa też dla nietech — pracujesz nad tekstem specyfikacji, nie nad kodem.</text>
</svg>
